<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéStock Tracker - Advanced Search</title>
    
    <meta name="referrer" content="no-referrer">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        html { scroll-behavior: smooth; }
        #backToTop.show { opacity: 1; pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
    
    <nav class="p-4 bg-white dark:bg-gray-800 shadow-md flex justify-between items-center sticky top-0 z-[60]">
        <h1 class="text-2xl font-bold text-red-600 dark:text-red-400">PokéStock Tracker</h1>
        
        <div class="flex items-center gap-4">
            <div class="relative hidden md:block">
                <input type="text" id="searchInput" placeholder="Search products..." 
                       class="pl-10 pr-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 border-none focus:ring-2 focus:ring-red-500 w-64 transition-all">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>
            
            <button id="themeToggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition">
                🌙
            </button>
        </div>
    </nav>

    <div class="p-4 md:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="relative">
            <input type="text" id="searchInputMobile" placeholder="Search products..." 
                   class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-700 border-none">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
        </div>
    </div>

    <main class="container mx-auto p-4 max-w-7xl">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <aside class="w-full lg:w-64 flex-shrink-0 lg:sticky lg:top-24 h-fit space-y-6 z-40">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                        <span>🔍</span> Filters
                    </h2>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Store</label>
                        <select id="storeFilter" class="w-full p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                            <option value="All">All Stores</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Expansion Set</label>
                        <select id="setFilter" class="w-full p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                            <option value="All">All Sets</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Price Range (€)</label>
                        <div class="flex gap-2 items-center">
                            <input type="number" id="minPrice" placeholder="Min" class="w-1/2 p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                            <span>-</span>
                            <input type="number" id="maxPrice" placeholder="Max" class="w-1/2 p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                        </div>
                    </div>

                    <button id="resetFilters" class="w-full mt-2 py-2 text-sm text-red-500 hover:text-red-600 font-medium">
                        Clear All Filters
                    </button>
                </div>
            </aside>

            <div class="flex-grow">
                <div class="sticky top-[72px] lg:top-24 z-50 bg-gray-50 dark:bg-gray-900 py-4 mb-2 overflow-x-auto no-scrollbar">
                    <div id="filterContainer" class="flex gap-2 min-w-max">
                        </div>
                </div>

                <div class="flex justify-between items-end mb-4">
                    <p id="productCount" class="text-sm font-medium text-gray-500"></p>
                    <p id="lastUpdated" class="text-xs text-gray-400"></p>
                </div>

                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                    </div>
            </div>
        </div>
    </main>

    <button id="backToTop" class="fixed bottom-8 right-8 p-3 bg-red-600 text-white rounded-full shadow-xl opacity-0 pointer-events-none transition-all duration-300 hover:bg-red-700 z-[70] hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
