<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéStock Tracker - Advanced Search</title>
    <meta name="referrer" content="no-referrer">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png?v=8">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon.png?v=8">
    <link rel="apple-touch-icon" href="./favicon.png?v=8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { 
            background-color: #F4F7F9; 
            background-image: radial-gradient(#e5e7eb 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            transition: background-color 0.3s, color 0.3s; 
        }
        .dark body { 
            background-color: #0f172a; 
            background-image: radial-gradient(#1e293b 0.5px, transparent 0.5px);
        }
        html { scroll-behavior: smooth; }
        #backToTop.show { opacity: 1; pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-btn { transition: all 0.2s ease-in-out; }
        .nav-btn:hover { transform: translateY(-2px); }
        input[type=range] { appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; cursor: pointer; background: #e5e7eb; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 18px; width: 18px; border-radius: 50%; background: #dc2626; cursor: pointer; appearance: none; margin-top: -6px; box-shadow: 0 0 10px rgba(220, 38, 38, 0.3); }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #334155; }
    </style>
</head>
<body class="text-gray-900 dark:text-gray-100 min-h-screen">

    <div id="donateModal" class="fixed inset-0 z-[100] bg-gray-900/60 backdrop-blur-sm flex items-center justify-center invisible opacity-0 transition-all duration-300">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-3xl shadow-2xl w-11/12 max-w-md transform scale-95 transition-transform duration-300" id="donateModalContent">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-black text-gray-900 dark:text-white flex items-center gap-2"><span class="text-emerald-500">💸</span> Support PokéStock</h2>
                <button id="closeDonateModal" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors bg-gray-100 dark:bg-gray-700 p-2 rounded-full">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 font-medium">If this tool helped you snag a great deal, consider leaving a tip to help keep the servers running!</p>
            
            <div class="space-y-4">
                <a href="https://paypal.me/pokestockpt" target="_blank" class="w-full flex items-center justify-center gap-3 p-4 bg-[#003087]/10 hover:bg-[#003087]/20 border border-[#003087]/20 rounded-2xl text-[#003087] dark:text-[#4b9dec] font-black transition-colors">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106z"/></svg>
                    PayPal
                </a>
                
                <button onclick="copyCrypto('BTC', 'bc1qlhqznqep0txmzkfey8sv64zrmw9eds9qa4y9xy')" class="w-full flex items-center justify-center gap-3 p-4 bg-orange-100 hover:bg-orange-200 dark:bg-orange-900/20 dark:hover:bg-orange-900/40 border border-orange-200 dark:border-orange-800/50 rounded-2xl text-orange-600 dark:text-orange-400 font-black transition-colors relative overflow-hidden group">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.036-1.24 15.525.362 9.095 1.964 2.667 8.475-1.243 14.906.361c6.43 1.603 10.34 8.113 8.732 14.543zm-6.634-5.35c.537-3.593-2.186-4.66-4.596-5.462l.983-3.943-2.396-.598-.952 3.824c-.63-.157-1.272-.307-1.9-.452l.955-3.83-2.396-.598-.985 3.947c-.52-.12-1.02-.24-1.493-.362l-2.062 5.097s1.112.257 1.088.27c.606.152.716.554.697.876l-1.393 5.59c-.063.172-.218.43-.68.315.025.025-1.09-.272-1.09-.272l-1.503 5.8 2.872.717c.583.146 1.173.298 1.764.444l-.994 3.987 2.396.598.983-3.95c.65.174 1.282.336 1.9.488l-.966 3.87 2.396.598.995-3.99c3.275.613 5.74.37 6.326-2.585.472-2.375-.246-3.744-1.768-4.64.757-.174 1.326-.606 1.488-1.543zm-4.324 6.273c-.66 2.65-5.116 1.218-6.558.857l1.175-4.717c1.44.36 6.07 1.087 5.383 3.86zm.575-6.84c-.602 2.417-4.34 1.185-5.556.883l1.062-4.26c1.216.303 5.12 1.077 4.494 3.377z"/></svg>
                    Crypto BTC
                </button>
                
                <button onclick="copyCrypto('USDC (SOL)', 'FFefPJiXLbExrZuek7cLVsvawp5gj9zbDAVuQm84K7u4')" class="w-full flex items-center justify-center gap-3 p-4 bg-blue-100 hover:bg-blue-200 dark:bg-blue-900/20 dark:hover:bg-blue-900/40 border border-blue-200 dark:border-blue-800/50 rounded-2xl text-blue-600 dark:text-blue-400 font-black transition-colors relative overflow-hidden group">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" fill="currentColor" stroke="none" class="text-blue-600 dark:text-blue-500" />
                        <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8" stroke="#ffffff" stroke-width="2"/>
                        <line x1="12" y1="18" x2="12" y2="6" stroke="#ffffff" stroke-width="2"/>
                    </svg>
                    Crypto USDC (SOL)
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-full shadow-2xl font-bold text-sm transition-all duration-300 translate-y-20 opacity-0 z-[110] flex items-center gap-2">
        ✅ <span id="toastMsg">Address copied!</span>
    </div>

    <nav class="p-4 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-sm border-b border-gray-200 dark:border-gray-700 flex justify-between items-center sticky top-0 z-[60]">
        <h1 class="text-2xl font-black text-red-600 dark:text-red-500 tracking-tighter italic">POKÉSTOCK</h1>
        
        <div class="flex items-center gap-3">
            <div class="relative hidden md:block">
                <input type="text" id="searchInput" placeholder="Search products..." class="pl-10 pr-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700/50 border-none focus:ring-2 focus:ring-red-500 w-64 transition-all">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>

            <button id="donateBtn" class="nav-btn p-2.5 bg-emerald-100 dark:bg-emerald-900/30 rounded-xl shadow-sm border border-emerald-200 dark:border-emerald-800 flex items-center justify-center transition-all hover:bg-emerald-200 dark:hover:bg-emerald-800/50 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-600 dark:text-emerald-400 group-hover:scale-110 transition-transform">
                    <line x1="12" x2="12" y1="2" y2="22"/>
                    <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </button>

            <a href="https://discord.gg/awxunXD9" target="_blank" class="nav-btn p-2.5 bg-[#5865F2] hover:bg-[#4752c4] rounded-xl shadow-lg shadow-[#5865F2]/30 flex items-center justify-center transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-white group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.862-1.297 1.197-1.99a.076.076 0 0 0-.041-.105 13.11 13.11 0 0 1-1.872-.89.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.89.076.076 0 0 0-.041.106c.34.693.74 1.362 1.196 1.99a.076.076 0 0 0 .084.029 19.835 19.835 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </a>

            <button id="themeToggle" class="nav-btn p-2.5 bg-white dark:bg-gray-700 rounded-xl shadow-sm border border-gray-200 dark:border-gray-600 flex items-center justify-center">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-500 dark:text-yellow-400">
                    <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path>
                    <path d="M9 18h6"></path>
                    <path d="M10 22h4"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="p-4 md:hidden bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
        <input type="text" id="searchInputMobile" placeholder="Search products..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-700/50 border-none">
    </div>

    <main class="container mx-auto p-4 max-w-7xl">
        <div class="flex flex-col lg:flex-row gap-8 mt-4">
            <aside class="w-full lg:w-64 flex-shrink-0 lg:sticky lg:top-24 h-fit space-y-6 z-40">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-gray-100 dark:border-gray-700">
                    <h2 class="text-lg font-bold mb-6 flex items-center gap-2">📊 Filters</h2>
                    
                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Store</label>
                        <select id="storeFilter" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 border-none text-sm focus:ring-2 focus:ring-red-500"></select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Pokemon Set</label>
                        <select id="setFilter" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 border-none text-sm focus:ring-2 focus:ring-red-500"></select>
                    </div>

                    <div class="mb-6">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Max Price: <span id="priceLabel" class="text-red-600">€2000</span></label>
                        <input type="range" id="priceSlider" min="0" max="2000" value="2000" step="10">
                    </div>

                    <button id="resetFilters" class="w-full py-3 text-xs font-black uppercase tracking-tighter text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors">Reset All</button>
                </div>
            </aside>

            <div class="flex-grow">
                <div class="sticky top-[72px] lg:top-24 z-50 bg-[#F4F7F9]/80 dark:bg-[#0f172a]/80 backdrop-blur-md py-4 mb-2 overflow-x-auto no-scrollbar">
                    <div id="filterContainer" class="flex gap-2 min-w-max px-1"></div>
                </div>
                <div class="flex justify-between items-end mb-6 px-1">
                    <p id="productCount" class="text-sm font-medium text-gray-400"></p>
                    <p id="lastUpdated" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest"></p>
                </div>
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
            </div>
        </div>
    </main>

    <button id="backToTop" class="fixed bottom-8 right-8 p-4 bg-red-600 text-white rounded-2xl shadow-2xl shadow-red-600/40 opacity-0 pointer-events-none transition-all duration-300 hover:scale-110 z-[70]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
    </button>

    <script src="script.js?v=8"></script>
</body>
</html>
