<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéStock Tracker - Advanced Search</title>
    <meta name="referrer" content="no-referrer">
    
    <link rel="icon" type="image/png" href="./favicon.png?v=2">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        html { scroll-behavior: smooth; }
        #backToTop.show { opacity: 1; pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #themeToggle svg, .nav-btn { transition: all 0.3s ease; }
        .nav-btn:hover { transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">

    <nav class="p-4 bg-white dark:bg-gray-800 shadow-md flex justify-between items-center sticky top-0 z-[60]">
        <h1 class="text-2xl font-bold text-red-600 dark:text-red-400">PokéStock Tracker</h1>
        
        <div class="flex items-center gap-3">
            <div class="relative hidden md:block">
                <input type="text" id="searchInput" placeholder="Search products..." class="pl-10 pr-4 py-2 rounded-lg bg-gray-100 dark:bg-gray-700 border-none focus:ring-2 focus:ring-red-500 w-64 transition-all">
                <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
            </div>

            <a href="https://discord.gg/awxunXD9" target="_blank" class="nav-btn p-2.5 bg-gray-100 dark:bg-gray-700 rounded-xl hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all flex items-center justify-center border border-gray-200 dark:border-gray-600 group">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-gray-600 dark:text-gray-300 group-hover:text-[#5865F2]" viewBox="0 0 24 24">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.862-1.297 1.197-1.99a.076.076 0 0 0-.041-.105 13.11 13.11 0 0 1-1.872-.89.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.89.076.076 0 0 0-.041.106c.34.693.74 1.362 1.196 1.99a.076.076 0 0 0 .084.029 19.835 19.835 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
            </a>

            <button id="themeToggle" class="nav-btn p-2.5 bg-gray-100 dark:bg-gray-700 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition-all flex items-center justify-center border border-gray-200 dark:border-gray-600">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-600 dark:text-yellow-400">
                    <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path>
                    <path d="M9 18h6"></path>
                    <path d="M10 22h4"></path>
                </svg>
            </button>
        </div>
    </nav>

    <div class="p-4 md:hidden bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="relative">
            <input type="text" id="searchInputMobile" placeholder="Search products..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-700 border-none">
            <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
        </div>
    </div>

    <main class="container mx-auto p-4 max-w-7xl">
        <div class="flex flex-col lg:flex-row gap-8">
            <aside class="w-full lg:w-64 flex-shrink-0 lg:sticky lg:top-24 h-fit space-y-6 z-40">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                    <h2 class="text-xl font-bold mb-4">🔍 Filters</h2>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Store</label>
                        <select id="storeFilter" class="w-full p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                            <option value="All">All Stores</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Pokemon Set</label>
                        <select id="setFilter" class="w-full p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600">
                            <option value="All">All Sets</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-semibold mb-2">Price Range (€)</label>
                        <div class="flex gap-2">
                            <input type="number" id="minPrice" placeholder="Min" class="w-1/2 p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border-none">
                            <input type="number" id="maxPrice" placeholder="Max" class="w-1/2 p-2 rounded-lg bg-gray-50 dark:bg-gray-700 border-none">
                        </div>
                    </div>
                    <button id="resetFilters" class="w-full mt-2 py-2 text-sm text-red-500 font-medium hover:text-red-600 transition-colors">Clear All Filters</button>
                </div>
            </aside>

            <div class="flex-grow">
                <div class="sticky top-[72px] lg:top-24 z-50 bg-gray-50 dark:bg-gray-900 py-4 mb-2 overflow-x-auto no-scrollbar">
                    <div id="filterContainer" class="flex gap-2 min-w-max"></div>
                </div>
                <div class="flex justify-between items-end mb-4">
                    <p id="productCount" class="text-sm text-gray-500 font-medium"></p>
                    <p id="lastUpdated" class="text-xs text-gray-400"></p>
                </div>
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>
        </div>
    </main>

    <button id="backToTop" class="fixed bottom-8 right-8 p-3 bg-red-600 text-white rounded-full shadow-xl opacity-0 pointer-events-none transition-all duration-300 hover:bg-red-700 z-[70] hover:scale-110">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
