<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos | PokéStockPT</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png?v=15">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon.png?v=15">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { background-color: #F4F7F9; transition: background-color 0.3s ease, color 0.3s ease; }
        .dark body { background-color: #0f172a; }
        body::before { content: ''; position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; transition: opacity 0.3s ease; opacity: 1; pointer-events: none; }
        body::after { content: ''; position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; transition: opacity 0.3s ease; opacity: 0; pointer-events: none; }
        .dark body::before { opacity: 0; }
        .dark body::after { opacity: 1; }
        .nav-btn { transition: all 0.2s ease-in-out; }
        .nav-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <nav class="p-4 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-sm border-b border-gray-200 dark:border-gray-700 flex justify-between items-center sticky top-0 z-[60] transition-colors duration-300">
        <div class="flex flex-col md:flex-row md:items-baseline gap-2 md:gap-6">
            <a href="/" class="text-2xl font-black text-red-600 dark:text-red-500 tracking-tighter italic transition-colors duration-300 hover:opacity-80">POKESTOCKPT</a>
            <div class="flex items-center gap-4">
    <a href="/" class="text-sm font-bold text-gray-500 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500 transition-colors">Home</a>
    <a href="/blog" class="text-sm font-bold text-gray-500 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500 transition-colors">Blog</a>
    <a href="/about" class="text-sm font-bold text-gray-500 hover:text-red-600 dark:text-gray-400 dark:hover:text-red-500 transition-colors">About Us</a>
</div>
        </div>
        <div class="flex items-center gap-3">
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl flex-grow mt-8 mb-16">
        <div class="bg-white dark:bg-gray-800 p-8 md:p-12 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">
            
            <h1 class="text-3xl font-black mb-2 text-gray-900 dark:text-white">Contactos</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-8">Tens alguma dúvida, encontraste um erro, ou representas uma loja que quer ser listada? Envia-nos uma mensagem.</p>
            
            <form action="https://formspree.io/f/xvzlvepb" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Email</label>
                    <input type="email" name="email" required class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-red-500 focus:outline-none transition-colors duration-300">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2">Mensagem</label>
                    <textarea name="message" rows="5" required class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 focus:ring-2 focus:ring-red-500 focus:outline-none transition-colors duration-300"></textarea>
                </div>
                
                <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-black uppercase tracking-widest rounded-xl transition-all hover:scale-105 shadow-lg shadow-red-600/30">
                    Enviar Mensagem
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-700 text-center">
                <p class="text-sm text-gray-500 dark:text-gray-400">Preferes usar o Discord?</p>
                <a href="https://discord.gg/6RCD7YkZF3" target="_blank" class="text-[#5865F2] font-bold hover:underline mt-2 inline-block">Junta-te ao nosso Servidor</a>
            </div>

        </div>
    </main>

    <footer class="py-6 text-center border-t border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-800/50 mt-auto">
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-2">
            © <script>document.write(new Date().getFullYear())</script> PokéStockPT. All rights reserved.
        </p>
        <div class="flex justify-center gap-4 text-xs">
            <a href="/privacy" class="text-gray-500 hover:text-red-500 transition-colors">Privacidade & Termos</a>
            <a href="/contact" class="text-gray-500 hover:text-red-500 transition-colors">Contactos</a>
        </div>
    </footer>
</body>
</html>
