<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Stock Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configure Tailwind for dark mode toggling
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        /* Smooth transitions for dark mode */
        body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen">
    
    <nav class="p-4 bg-white dark:bg-gray-800 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold text-red-600 dark:text-red-400">PokéStock Tracker</h1>
        <button id="themeToggle" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition">
            🌙 Dark Mode
        </button>
    </nav>

    <main class="container mx-auto p-4 max-w-7xl">
        
        <div class="my-6">
            <h2 class="text-lg font-semibold mb-3">Filter by Category:</h2>
            <div id="filterContainer" class="flex flex-wrap gap-2">
                </div>
        </div>

        <p id="lastUpdated" class="text-sm text-gray-500 dark:text-gray-400 mb-4">Fetching data...</p>

        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
